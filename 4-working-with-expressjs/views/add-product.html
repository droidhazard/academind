<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Product</title>
    <style>
      *,
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
        transition: 0.1s ease-in-out;
      }

      main {
        padding: 1rem;
      }
      .main-header {
        width: 100%;
        height: 3.5rem;
        background-color: #e7ae1f;
        padding: 0 1.5rem;
      }
      .main-header__nav {
        height: 100%;
        display: flex;
        /* justify-content: center; */
        align-items: center;
      }
      .main-header__item-list {
        list-style: none;
        display: flex;
      }
      .main-header__item {
        margin: 0 1rem;
      }
      .main-header__item a {
        text-decoration: none;
        color: black;
      }
      .main-header__item a:hover,
      .main-header__item a:active,
      .main-header__item a.active {
        /* color: #4d27e2; */
        background-color: #cd9915;
        font-weight: bold;
      }

      .product-form {
        width: 20rem;
        max-width: 90%;
        margin: auto;
      }

      .form-control {
        margin: 1rem 0;
      }
      .form-control label,
      .form-control input {
        display: block;
        width: 100%;
      }
      .form-control input {
        padding: 5px;
        font: inherit;
        border-radius: 5px;
        border: 1px solid #e7ae1f;
      }
      button {
        font-family: inherit;
        border: 1px solid #7d15cd;
        color: #7d15cd;
        background: white;
        padding: 5px;
        border-radius: 3px;
        cursor: pointer;
        transition: 0.1s ease-in-out;
      }
      button:hover,
      button:active {
        background-color: #7d15cd;
        color: white;
      }
    </style>
  </head>
  <body>
    <header class="main-header">
      <nav class="main-header__nav">
        <ul class="main-header__item-list">
          <li class="main-header__item"><a href="/">Shop</a></li>
          <li class="main-header__item">
            <a href="/admin/add-product" class="active">Add Product</a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <form action="/admin/add-product" method="post" class="product-form">
        <div class="form-control">
          <label for="title">Title</label>
          <input type="text" name="title" id="title" />
        </div>
        <button type="submit">Add Product</button>
      </form>
    </main>
  </body>
</html>
